<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario Digital Vintage</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: #f5f3f0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 100, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(120, 119, 100, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(120, 119, 100, 0.03) 0%, transparent 50%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 24px,
                    rgba(120, 119, 100, 0.05) 25px,
                    rgba(120, 119, 100, 0.05) 26px
                );
            pointer-events: none;
            z-index: 1;
        }

        .diary-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(250, 248, 245, 0.9);
            border-radius: 10px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 2;
            min-height: 80vh;
            overflow: hidden;
        }

        .diary-header {
            text-align: center;
            padding: 30px;
            border-bottom: 1px solid rgba(120, 119, 100, 0.2);
            background: linear-gradient(135deg, rgba(245, 243, 240, 0.8), rgba(240, 237, 232, 0.8));
        }

        .diary-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #4a4739;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .current-date {
            font-size: 1.2rem;
            color: #6b6456;
            font-style: italic;
            font-weight: 400;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(248, 246, 243, 0.7);
            border-bottom: 1px solid rgba(120, 119, 100, 0.15);
        }

        .nav-button {
            background: rgba(74, 71, 57, 0.8);
            color: #f5f3f0;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Crimson Text', serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .nav-button:hover {
            background: rgba(74, 71, 57, 1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .nav-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .week-display {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #4a4739;
            font-weight: 600;
        }

        .diary-content {
            display: flex;
            height: calc(100vh - 200px);
            min-height: 500px;
        }

        .days-container {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            flex: 1;
            background: rgba(120, 119, 100, 0.1);
        }

        .day-column {
            background: rgba(250, 248, 245, 0.95);
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
        }

        .day-column:hover {
            background: rgba(252, 250, 247, 1);
            box-shadow: inset 0 0 20px rgba(74, 71, 57, 0.05);
        }

        .day-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(120, 119, 100, 0.2);
            padding-bottom: 10px;
        }

        .day-name {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #4a4739;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .day-number {
            font-size: 1.1rem;
            color: #6b6456;
            font-weight: 600;
        }

        .entries-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .entry-item {
            background: rgba(255, 255, 255, 0.7);
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #d4c5a0;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #4a4739;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .entry-item:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateX(3px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .entry-item.completed {
            background: rgba(144, 186, 144, 0.2);
            border-left-color: #90ba90;
            opacity: 0.8;
            text-decoration: line-through;
            order: 999;
        }

        .add-entry-btn {
            background: rgba(212, 197, 160, 0.3);
            border: 2px dashed rgba(120, 119, 100, 0.4);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            color: #6b6456;
            font-style: italic;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .add-entry-btn:hover {
            background: rgba(212, 197, 160, 0.5);
            border-color: rgba(120, 119, 100, 0.6);
        }

        .entry-input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(120, 119, 100, 0.3);
            border-radius: 8px;
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.9);
            color: #4a4739;
            resize: vertical;
            min-height: 60px;
        }

        .entry-input:focus {
            outline: none;
            border-color: #d4c5a0;
            box-shadow: 0 0 10px rgba(212, 197, 160, 0.3);
        }

        .entry-buttons {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-save, .btn-cancel {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Crimson Text', serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-save {
            background: #4a4739;
            color: white;
        }

        .btn-save:hover {
            background: #5a5349;
        }

        .btn-cancel {
            background: rgba(120, 119, 100, 0.2);
            color: #4a4739;
        }

        .btn-cancel:hover {
            background: rgba(120, 119, 100, 0.3);
        }

        @media (max-width: 768px) {
            .days-container {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 10px;
            }
            
            .diary-title {
                font-size: 2rem;
            }
            
            .day-column {
                min-height: 200px;
            }
        }

        @media (max-width: 1024px) and (orientation: landscape) {
            .days-container {
                grid-template-columns: repeat(7, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="diary-container">
        <div class="diary-header">
            <h1 class="diary-title">Mi Diario Personal</h1>
            <div class="current-date" id="currentDate"></div>
        </div>
        
        <div class="navigation">
            <button class="nav-button" id="prevWeek">← Semana Anterior</button>
            <div class="week-display" id="weekDisplay"></div>
            <button class="nav-button" id="nextWeek">Siguiente Semana →</button>
        </div>
        
        <div class="diary-content">
            <div class="days-container" id="daysContainer"></div>
        </div>
    </div>

    <script>
        class VintageDiary {
            constructor() {
                this.currentWeek = this.getWeekStart(new Date());
                this.entries = this.loadEntries();
                this.init();
            }

            init() {
                this.updateCurrentDate();
                this.renderWeek();
                this.bindEvents();
            }

            getWeekStart(date) {
                const d = new Date(date);
                const day = d.getDay();
                const diff = d.getDate() - day;
                return new Date(d.setDate(diff));
            }

            updateCurrentDate() {
                const options = { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                };
                document.getElementById('currentDate').textContent = 
                    new Date().toLocaleDateString('es-ES', options);
            }

            renderWeek() {
                const container = document.getElementById('daysContainer');
                const weekDisplay = document.getElementById('weekDisplay');
                
                container.innerHTML = '';
                
                const days = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
                const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 
                              'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
                
                const weekStart = new Date(this.currentWeek);
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekEnd.getDate() + 6);
                
                weekDisplay.textContent = `${weekStart.getDate()} ${months[weekStart.getMonth()]} - ${weekEnd.getDate()} ${months[weekEnd.getMonth()]} ${weekEnd.getFullYear()}`;

                for (let i = 0; i < 7; i++) {
                    const date = new Date(this.currentWeek);
                    date.setDate(date.getDate() + i);
                    
                    const dayColumn = this.createDayColumn(date, days[i]);
                    container.appendChild(dayColumn);
                }
            }

            createDayColumn(date, dayName) {
                const column = document.createElement('div');
                column.className = 'day-column';
                
                const dateKey = this.getDateKey(date);
                const dayEntries = this.entries[dateKey] || [];
                
                column.innerHTML = `
                    <div class="day-header">
                        <div class="day-name">${dayName}</div>
                        <div class="day-number">${date.getDate()}</div>
                    </div>
                    <div class="entries-container" data-date="${dateKey}">
                        ${dayEntries.map(entry => this.createEntryHTML(entry)).join('')}
                        <div class="add-entry-btn" onclick="diary.showEntryInput('${dateKey}')">
                            + Agregar entrada del día...
                        </div>
                    </div>
                `;
                
                return column;
            }

            createEntryHTML(entry) {
                return `
                    <div class="entry-item ${entry.completed ? 'completed' : ''}" 
                         onclick="diary.toggleEntry('${entry.id}')">
                        ${entry.text}
                    </div>
                `;
            }

            showEntryInput(dateKey) {
                const container = document.querySelector(`[data-date="${dateKey}"]`);
                const addBtn = container.querySelector('.add-entry-btn');
                
                const inputHTML = `
                    <textarea class="entry-input" placeholder="Escribe tu entrada del diario aquí..." 
                              onkeydown="if(event.key==='Enter' && event.ctrlKey) diary.saveEntry('${dateKey}', this.value)"></textarea>
                    <div class="entry-buttons">
                        <button class="btn-save" onclick="diary.saveEntry('${dateKey}', this.parentElement.previousElementSibling.value)">Guardar</button>
                        <button class="btn-cancel" onclick="diary.cancelEntry('${dateKey}')">Cancelar</button>
                    </div>
                `;
                
                addBtn.style.display = 'none';
                container.insertAdjacentHTML('beforeend', inputHTML);
                container.querySelector('.entry-input').focus();
            }

            saveEntry(dateKey, text) {
                if (!text.trim()) return;
                
                if (!this.entries[dateKey]) {
                    this.entries[dateKey] = [];
                }
                
                const entry = {
                    id: Date.now().toString(),
                    text: text.trim(),
                    completed: false,
                    timestamp: new Date().toISOString()
                };
                
                this.entries[dateKey].push(entry);
                this.saveEntries();
                this.renderWeek();
            }

            cancelEntry(dateKey) {
                const container = document.querySelector(`[data-date="${dateKey}"]`);
                const input = container.querySelector('.entry-input');
                const buttons = container.querySelector('.entry-buttons');
                const addBtn = container.querySelector('.add-entry-btn');
                
                if (input) input.remove();
                if (buttons) buttons.remove();
                addBtn.style.display = 'block';
            }

            toggleEntry(entryId) {
                for (const dateKey in this.entries) {
                    const entry = this.entries[dateKey].find(e => e.id === entryId);
                    if (entry) {
                        entry.completed = !entry.completed;
                        break;
                    }
                }
                this.saveEntries();
                this.renderWeek();
            }

            bindEvents() {
                document.getElementById('prevWeek').addEventListener('click', () => {
                    this.currentWeek.setDate(this.currentWeek.getDate() - 7);
                    this.renderWeek();
                });

                document.getElementById('nextWeek').addEventListener('click', () => {
                    this.currentWeek.setDate(this.currentWeek.getDate() + 7);
                    this.renderWeek();
                });
            }

            getDateKey(date) {
                return date.toISOString().split('T')[0];
            }

            loadEntries() {
                try {
                    return JSON.parse(localStorage.getItem('vintageDiaryEntries')) || {};
                } catch {
                    return {};
                }
            }

            saveEntries() {
                localStorage.setItem('vintageDiaryEntries', JSON.stringify(this.entries));
            }
        }

        // Initialize the diary
        const diary = new VintageDiary();
    </script>
</body>
</html>
